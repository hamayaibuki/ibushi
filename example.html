<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>完成例 | 自己紹介サイト</title>
<link rel="stylesheet" href="style.css">
</head>
<body class="example-page">

<main class="example-wrap">
    <div class="example-top">
        <img class="example-img" src="https://placehold.jp/300x300.png" alt="プロフィール画像">
        <h1>濱屋伊吹</h1>
    </div>

    <hr>

    <section>
        <h2>自己紹介</h2>
        <p>
            はじめまして、濱屋伊吹と申します。
            道東の羅臼町出身です。
            現在は大学四年生です。
            ライブに行くのとごはんに行くのが好きです。
        </p>
    </section>

    <section>
        <h2>好きなこと</h2>
        <ul>
            <li>食べること</li>
            <li>ライブに行くこと</li>
            <li>人と話すこと</li>
        </ul>
    </section>

    <section>
        <h2>趣味</h2>
        <ul>
            <li>音楽鑑賞</li>
            <li>筋トレ</li>
            <li>ゲーム</li>
        </ul>
    </section>

    <section>
        <h2>SNS・おすすめリンク</h2>
        <a class="example-link" href="https://www.google.com" target="_blank">おすすめサイトを見る</a>
    </section>
</main>

</html>
